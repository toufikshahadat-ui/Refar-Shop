<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refar Shop Admin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding-bottom: 80px; }
        .header { background: #007bff; color: white; padding: 20px; text-align: center; }
        .card { background: white; padding: 15px; margin: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { padding: 10px; border: none; border-radius: 5px; color: white; cursor: pointer; width: 48%; }
        .btn-green { background: #28a745; }
        .btn-red { background: #dc3545; }
        .page { display: none; }
        .active { display: block; }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="header"><h2>Refar Shop</h2></div>

<!-- হোম পেজ -->
<div id="page-home" class="page active">
    <div class="card"><h3>আপনার ব্যালেন্স: ৳ <span id="userBal">0.00</span></h3></div>
    <div class="card">
        <input type="text" id="proofInput" placeholder="টাস্ক প্রুফ বা ডিপোজিট ডিটেইলস" style="width: 90%; padding: 10px;">
        <button class="btn btn-green" style="width: 100%; margin-top:10px;" onclick="submitRequest('Task/Deposit')">সাবমিট করুন</button>
    </div>
    <div class="card">
        <button class="btn btn-green" style="width: 100%;" onclick="requestWithdraw()">৳ ৫০ উইথড্র করুন</button>
    </div>
</div>

<!-- অ্যাডমিন পেজ -->
<div id="page-admin" class="page">
    <div class="card"><h3>🔐 অ্যাডমিন প্যানেল</h3>
        <div id="admin-content">আপনার আইডি অ্যাডমিন নয়!</div>
    </div>
</div>

<div class="nav">
    <div onclick="showPage('home')">🏠 হোম</div>
    <div onclick="showPage('admin')">🛡️ অ্যাডমিন</div>
</div>

<script>
    const MY_ID = 8380674482; // আপনার আসল টেলিগ্রাম আইডি
    let tg = window.Telegram.WebApp;
    let userId = tg.initDataUnsafe?.user?.id || 12345;
    
    // ব্যালেন্স সেটআপ (জিরো)
    let balance = parseFloat(localStorage.getItem('bal_' + userId) || 0);
    document.getElementById('userBal').innerText = balance.toFixed(2);

    function showPage(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
        if(p === 'admin') renderAdmin();
    }

    // রিকোয়েস্ট সাবমিট
    function submitRequest(type) {
        let proof = document.getElementById('proofInput').value;
        let reqs = JSON.parse(localStorage.getItem('requests') || '[]');
        reqs.push({ userId, proof, type, status: 'pending', id: Date.now() });
        localStorage.setItem('requests', JSON.stringify(reqs));
        alert("সাবমিট হয়েছে! অ্যাডমিন চেক করবেন।");
    }

    // উইথড্র লজিক
    function requestWithdraw() {
        if(balance < 50) return alert("ন্যূনতম ৫০ টাকা ব্যালেন্স প্রয়োজন!");
        let last = localStorage.getItem('lastWithdraw_' + userId);
        if(last && (Date.now() - last < 86400000)) return alert("২৪ ঘণ্টায় একবারই উইথড্র করা যাবে!");
        
        submitRequest('Withdraw 50 BDT');
        localStorage.setItem('lastWithdraw_' + userId, Date.now());
    }

    // অ্যাডমিন প্যানেল রেন্ডার
    function renderAdmin() {
        if(userId !== MY_ID) return;
        let reqs = JSON.parse(localStorage.getItem('requests') || '[]');
        let html = "<h4>পেন্ডিং রিকোয়েস্ট:</h4>";
        reqs.forEach((r, i) => {
            if(r.status == 'pending') {
                html += `<div class="card"><p>User: ${r.userId}<br>Proof: ${r.proof}</p>
                <button class="btn btn-green" onclick="approve(${i})">এপ্রুভ</button>
                <button class="btn btn-red" onclick="reject(${i})">রিজেক্ট</button></div>`;
            }
        });
        document.getElementById('admin-content').innerHTML = html || "কোন রিকোয়েস্ট নেই।";
    }

    function approve(i) {
        let reqs = JSON.parse(localStorage.getItem('requests'));
        let targetUser = reqs[i].userId;
        let currentBal = parseFloat(localStorage.getItem('bal_' + targetUser) || 0);
        localStorage.setItem('bal_' + targetUser, currentBal + 50); // ডিপোজিট এপ্রুভ হলে ব্যালেন্স যোগ
        
        reqs[i].status = 'approved';
        localStorage.setItem('requests', JSON.stringify(reqs));
        alert("সফলভাবে এপ্রুভ হয়েছে!");
        renderAdmin();
    }

    function reject(i) {
        let reqs = JSON.parse(localStorage.getItem('requests'));
        reqs[i].status = 'rejected';
        localStorage.setItem('requests', JSON.stringify(reqs));
        alert("রিজেক্ট করা হয়েছে!");
        renderAdmin();
    }
</script>
</body>
</html>
